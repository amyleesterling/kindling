<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Kindling</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;1,300&display=swap" rel="stylesheet" />
<style>
  :root{
    --void:#07080f;
    --text:#cfd3e2;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{height:100%;overflow:hidden;background:var(--void);}
  body{
    font-family:"Cormorant", Georgia, "Times New Roman", serif;
    color:var(--text);
    -webkit-tap-highlight-color:transparent;
    touch-action:none;
  }
  #field{display:block;position:fixed;inset:0;}

  /* The few words. They arrive, then step out of the way. */
  #veil{
    position:fixed;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center;pointer-events:none;
    text-align:center;gap:1.1rem;
    transition:opacity 2.6s ease 3.4s;
  }
  #veil.lift{opacity:0;}
  #title{
    font-size:clamp(2.6rem,11vw,5.2rem);
    font-weight:300;font-style:italic;letter-spacing:.04em;
    color:#f3ead9;opacity:0;
    text-shadow:0 0 38px rgba(232,162,76,.28);
    animation:bloom 3s ease forwards .5s;
  }
  #hint{
    font-family:ui-monospace,"SF Mono",Menlo,monospace;
    font-size:.72rem;letter-spacing:.28em;text-transform:uppercase;
    font-style:normal;color:rgba(207,211,226,.42);opacity:0;
    animation:bloom 2.4s ease forwards 1.8s;
  }
  /* A small mark that stays, once the field is yours. */
  #mark{
    position:fixed;left:clamp(16px,4vw,34px);bottom:clamp(14px,3.4vh,28px);
    font-size:1.05rem;font-style:italic;font-weight:300;
    color:rgba(243,234,217,.0);letter-spacing:.05em;pointer-events:none;
    transition:color 3s ease 4.4s;
  }
  #mark.show{color:rgba(243,234,217,.34);}
  @keyframes bloom{to{opacity:1;}}
  @media (prefers-reduced-motion:reduce){
    #title,#hint{animation-duration:.01ms;animation-delay:0ms;opacity:1;}
    #veil{transition:opacity 1s ease 6s;}
  }
</style>
</head>
<body>
  <canvas id="field"></canvas>
  <div id="veil">
    <div id="title">Kindling</div>
    <div id="hint">touch the field</div>
  </div>
  <div id="mark">Kindling</div>

<script>
(() => {
  "use strict";
  const canvas = document.getElementById("field");
  const ctx = canvas.getContext("2d", { alpha: false });
  const reduced = window.matchMedia("(prefers-reduced-motion: reduce)").matches;

  // ---- palette: warmth is something the field earns by connecting ----
  const COLD  = [74, 90, 140];   // a mote alone — dim periwinkle
  const EMBER = [232, 162, 76];  // a mote among others — amber
  const FLARE = [255, 241, 214]; // a signal passing through — warm white

  let W = 0, H = 0, DPR = 1;
  let motes = [];
  let radius = 90, radius2 = 8100, spacing = 60;
  let breath = 0;
  let nextPulse = 0;
  const pointer = { x: 0, y: 0, active: false };

  function lerp(a, b, t){ return a + (b - a) * t; }
  function mix(c1, c2, t){
    return [ lerp(c1[0],c2[0],t), lerp(c1[1],c2[1],t), lerp(c1[2],c2[2],t) ];
  }

  // A soft round light, drawn once and reused — bloom without the cost.
  const sprite = document.createElement("canvas");
  const sctx = sprite.getContext("2d");
  function buildSprite(){
    const s = 64; sprite.width = s; sprite.height = s;
    const g = sctx.createRadialGradient(s/2,s/2,0,s/2,s/2,s/2);
    g.addColorStop(0,   "rgba(255,255,255,1)");
    g.addColorStop(0.25,"rgba(255,255,255,0.55)");
    g.addColorStop(0.55,"rgba(255,255,255,0.16)");
    g.addColorStop(1,   "rgba(255,255,255,0)");
    sctx.clearRect(0,0,s,s);
    sctx.fillStyle = g; sctx.fillRect(0,0,s,s);
  }

  function resize(){
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + "px";
    canvas.style.height = H + "px";
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);

    const area = W * H;
    const count = Math.max(55, Math.min(140, Math.round(area / 7000)));
    spacing = Math.sqrt(area / count);
    radius = spacing * 1.75;
    radius2 = radius * radius;

    // Re-seed only when the population needs to change; otherwise keep the field alive.
    if (motes.length !== count){
      motes = new Array(count).fill(0).map(() => makeMote());
    }
  }

  function makeMote(){
    const ang = Math.random() * Math.PI * 2;
    const sp = (reduced ? 0.04 : 0.10) * (0.4 + Math.random());
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: Math.cos(ang) * sp,
      vy: Math.sin(ang) * sp,
      warmth: 0,      // slow: how connected this mote has been
      target: 0,      // this frame's local density
      charge: 0,      // fast: a signal currently passing through
      delta: 0,       // charge received this frame
    };
  }

  function seedPulse(){
    if (!motes.length) return;
    const m = motes[(Math.random() * motes.length) | 0];
    m.charge = 1;
  }

  // ---- the loop ----
  let last = performance.now();
  function frame(now){
    let dt = (now - last) / 16.667; last = now;
    if (dt > 3) dt = 3; // tab was backgrounded; don't lurch

    breath += dt * 0.0045;
    const breathe = 0.82 + 0.18 * Math.sin(breath);          // slow swell
    const reach2 = radius2 * (reduced ? 1 : (0.86 + 0.14 * Math.sin(breath)));

    // spontaneous signals — the field has a life of its own
    if (!reduced){
      nextPulse -= dt;
      if (nextPulse <= 0){ seedPulse(); nextPulse = 110 + Math.random() * 150; }
    }

    const margin = spacing * 1.2;
    for (let i = 0; i < motes.length; i++){
      const m = motes[i];
      m.target = 0; m.delta = 0;

      // a little wandering, so nothing is ever quite still
      if (!reduced){
        m.vx += (Math.random() - 0.5) * 0.006 * dt;
        m.vy += (Math.random() - 0.5) * 0.006 * dt;
      }
      // soft walls — the field is a held thing, not an escaping one
      if (m.x < margin)      m.vx += (margin - m.x) * 0.00018 * dt;
      if (m.x > W - margin)  m.vx -= (m.x - (W - margin)) * 0.00018 * dt;
      if (m.y < margin)      m.vy += (margin - m.y) * 0.00018 * dt;
      if (m.y > H - margin)  m.vy -= (m.y - (H - margin)) * 0.00018 * dt;

      // attention draws things together
      if (pointer.active){
        const dx = pointer.x - m.x, dy = pointer.y - m.y;
        const d2 = dx*dx + dy*dy;
        const R = spacing * 4.5;
        if (d2 < R*R){
          const d = Math.sqrt(d2) || 1;
          const pull = (1 - d / R) * 0.05 * dt;
          m.vx += (dx / d) * pull;
          m.vy += (dy / d) * pull;
        }
      }

      m.vx *= 0.985; m.vy *= 0.985;
      const cap = 0.9;
      const sp2 = m.vx*m.vx + m.vy*m.vy;
      if (sp2 > cap*cap){ const s = cap / Math.sqrt(sp2); m.vx *= s; m.vy *= s; }
      m.x += m.vx * dt; m.y += m.vy * dt;
    }

    // ---- draw the field background ----
    ctx.globalCompositeOperation = "source-over";
    ctx.fillStyle = "#07080f";
    ctx.fillRect(0, 0, W, H);

    // ---- connections + signal propagation (one pass over the pairs) ----
    ctx.globalCompositeOperation = "lighter";
    ctx.lineWidth = 1;
    for (let i = 0; i < motes.length; i++){
      const a = motes[i];
      for (let j = i + 1; j < motes.length; j++){
        const b = motes[j];
        const dx = a.x - b.x, dy = a.y - b.y;
        const d2 = dx*dx + dy*dy;
        if (d2 > reach2) continue;
        const close = 1 - d2 / reach2;       // 1 when touching, 0 at the edge
        a.target += close; b.target += close;

        // a charged mote lends its light to its neighbours
        const flow = close * 0.20 * dt;
        a.delta += b.charge * flow;
        b.delta += a.charge * flow;

        // the thread itself, coloured by the warmth it joins
        const w = (a.warmth + b.warmth) * 0.5;
        const c = mix(COLD, EMBER, w);
        const glow = Math.min(1, (a.charge + b.charge) * 0.5);
        const col = mix(c, FLARE, glow);
        const alpha = close * (0.05 + 0.16 * w + 0.5 * glow) * breathe;
        if (alpha > 0.004){
          ctx.strokeStyle = `rgba(${col[0]|0},${col[1]|0},${col[2]|0},${alpha.toFixed(3)})`;
          ctx.beginPath(); ctx.moveTo(a.x, a.y); ctx.lineTo(b.x, b.y); ctx.stroke();
        }
      }
    }

    // ---- settle values, then draw the motes as light ----
    for (let i = 0; i < motes.length; i++){
      const m = motes[i];
      // warmth eases toward how connected it is right now
      const dens = Math.min(1, m.target / 5);
      m.warmth += (dens - m.warmth) * 0.04 * dt;
      // charge decays but keeps what its neighbours passed along
      m.charge = m.charge * (1 - 0.045 * dt) + m.delta;
      if (m.charge > 1) m.charge = 1;
      if (m.charge < 0.0005) m.charge = 0;

      const base = mix(COLD, EMBER, m.warmth);
      const col = mix(base, FLARE, m.charge);
      const bright = (0.5 + 0.5 * m.warmth) * breathe + m.charge * 0.9;
      const size = (spacing * 0.5) * (0.6 + 0.5 * m.warmth + 0.9 * m.charge);

      ctx.globalAlpha = Math.min(1, 0.5 * bright);
      drawTinted(m.x, m.y, size, col);

      // a bright small core
      ctx.globalAlpha = Math.min(1, 0.5 + 0.5 * m.charge);
      const core = 1.4 + m.charge * 1.6;
      ctx.fillStyle = `rgb(${col[0]|0},${col[1]|0},${col[2]|0})`;
      ctx.beginPath(); ctx.arc(m.x, m.y, core, 0, 6.2832); ctx.fill();
    }
    ctx.globalAlpha = 1;

    // a soft warmth where attention rests
    if (pointer.active){
      ctx.globalAlpha = 0.5;
      drawTinted(pointer.x, pointer.y, spacing * 2.2, EMBER);
      ctx.globalAlpha = 1;
    }

    ctx.globalCompositeOperation = "source-over";
    requestAnimationFrame(frame);
  }

  // draw the reusable light, tinted, centred at x,y with given diameter-ish size
  function drawTinted(x, y, size, col){
    const s = size * 2;
    // tint by drawing the white sprite then multiplying — cheaper: pre-tint via globalComposite isn't simple,
    // so we lean on additive blending + a colored core; the sprite supplies the bloom shape.
    ctx.drawImage(spriteFor(col), x - s/2, y - s/2, s, s);
  }

  // tiny cache of tinted sprites keyed by coarse color, so bloom takes the mote's hue
  const tintCache = new Map();
  function spriteFor(col){
    const key = ((col[0]>>4)<<8) | ((col[1]>>4)<<4) | (col[2]>>4);
    let cv = tintCache.get(key);
    if (cv) return cv;
    cv = document.createElement("canvas");
    cv.width = sprite.width; cv.height = sprite.height;
    const c = cv.getContext("2d");
    c.drawImage(sprite, 0, 0);
    c.globalCompositeOperation = "source-in";
    c.fillStyle = `rgb(${col[0]|0},${col[1]|0},${col[2]|0})`;
    c.fillRect(0, 0, cv.width, cv.height);
    if (tintCache.size > 600) tintCache.clear();
    tintCache.set(key, cv);
    return cv;
  }

  // ---- touch / pointer ----
  function setPointer(e){
    const t = e.touches ? e.touches[0] : e;
    if (!t) return;
    pointer.x = t.clientX; pointer.y = t.clientY;
  }
  function onDown(e){
    setPointer(e); pointer.active = true;
    // waking the nearest motes — your touch is a spark
    let best = -1, bd = Infinity;
    for (let i = 0; i < motes.length; i++){
      const dx = motes[i].x - pointer.x, dy = motes[i].y - pointer.y;
      const d = dx*dx + dy*dy;
      if (d < bd){ bd = d; best = i; }
    }
    if (best >= 0) motes[best].charge = 1;
    liftVeil();
  }
  function onMove(e){ if (pointer.active){ setPointer(e); e.preventDefault && e.preventDefault(); } }
  function onUp(){ pointer.active = false; }

  canvas.addEventListener("mousedown", onDown);
  window.addEventListener("mousemove", onMove);
  window.addEventListener("mouseup", onUp);
  canvas.addEventListener("touchstart", (e)=>{ onDown(e); }, {passive:true});
  window.addEventListener("touchmove", onMove, {passive:false});
  window.addEventListener("touchend", onUp);

  // ---- the words stepping aside ----
  const veil = document.getElementById("veil");
  const mark = document.getElementById("mark");
  let lifted = false;
  function liftVeil(){
    if (lifted) return; lifted = true;
    veil.classList.add("lift");
    mark.classList.add("show");
  }
  // if no one touches, the veil still lifts on its own after a while
  setTimeout(liftVeil, reduced ? 7000 : 6500);

  window.addEventListener("resize", resize);
  buildSprite();
  resize();
  nextPulse = 40;
  // a first signal, so the field is already breathing when you arrive
  setTimeout(seedPulse, 1200);
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
